databaseChangeLog:
  # Базовый changeset - отмечаем существующую БД как отправную точку
  - changeSet:
      id: 0
      author: beauty-salon
      comment: "Mark existing database as baseline"
      changes:
        - tagDatabase:
            tag: "baseline"

  # ==================== СОЗДАНИЕ ТАБЛИЦ (только если их нет) ====================

  - changeSet:
      id: 1
      author: beauty-salon
      comment: "Create roles table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS roles (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                name VARCHAR(100) NOT NULL,
                description VARCHAR(100)
              );

  - changeSet:
      id: 2
      author: beauty-salon
      comment: "Create employees table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS employees (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                last_name VARCHAR(50) NOT NULL,
                first_name VARCHAR(30) NOT NULL,
                middle_name VARCHAR(30),
                specialization VARCHAR(100) NOT NULL,
                phone VARCHAR(11) NOT NULL UNIQUE,
                email VARCHAR(150) NOT NULL UNIQUE
              );

  - changeSet:
      id: 3
      author: beauty-salon
      comment: "Create clients table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS clients (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                last_name VARCHAR(50) NOT NULL,
                first_name VARCHAR(30) NOT NULL,
                middle_name VARCHAR(30),
                phone VARCHAR(11) NOT NULL UNIQUE,
                email VARCHAR(150) NOT NULL UNIQUE,
                birth_date DATE NOT NULL,
                registration_date DATE NOT NULL
              );

  - changeSet:
      id: 4
      author: beauty-salon
      comment: "Create procedures table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS procedures (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                name VARCHAR(100) NOT NULL,
                cost VARCHAR(50) NOT NULL,
                duration VARCHAR(50) NOT NULL
              );

  - changeSet:
      id: 5
      author: beauty-salon
      comment: "Create employee_roles table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS employee_roles (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                employee_id INTEGER NOT NULL,
                role_id INTEGER NOT NULL,
                assignment_date DATE NOT NULL,
                CONSTRAINT fk_employee_roles_employee FOREIGN KEY (employee_id) REFERENCES employees(id),
                CONSTRAINT fk_employee_roles_role FOREIGN KEY (role_id) REFERENCES roles(id)
              );

  - changeSet:
      id: 6
      author: beauty-salon
      comment: "Create schedules table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS schedules (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                employee_id INTEGER NOT NULL,
                date DATE NOT NULL,
                start_time TIME NOT NULL,
                end_time TIME NOT NULL,
                break_start TIME,
                break_end TIME,
                CONSTRAINT fk_schedules_employee FOREIGN KEY (employee_id) REFERENCES employees(id)
              );

  - changeSet:
      id: 7
      author: beauty-salon
      comment: "Create appointments table if not exists"
      changes:
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS appointments (
                id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                client_id INTEGER NOT NULL,
                employee_id INTEGER NOT NULL,
                procedure_id INTEGER NOT NULL,
                date DATE NOT NULL,
                time TIME NOT NULL,
                status VARCHAR(20) NOT NULL,
                note VARCHAR(255),
                CONSTRAINT fk_appointments_client FOREIGN KEY (client_id) REFERENCES clients(id),
                CONSTRAINT fk_appointments_employee FOREIGN KEY (employee_id) REFERENCES employees(id),
                CONSTRAINT fk_appointments_procedure FOREIGN KEY (procedure_id) REFERENCES procedures(id)
              );

